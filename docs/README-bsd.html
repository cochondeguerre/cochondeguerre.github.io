                <h1 id="freebsd-openbsd-netbsd">FreeBSD / OpenBSD / NetBSD</h1>
<p>SDL is fully supported on BSD platforms, and is built using <a href="README-cmake.html">CMake</a>.</p>
<p>If you want to run on the console, you can take a look at <a href="README-kmsbsd.html">KMSDRM support on BSD</a></p>
<p>SDL is <a href="README-platforms.md#setuid.html">not designed to be used in setuid or setgid executables</a>.</p>
